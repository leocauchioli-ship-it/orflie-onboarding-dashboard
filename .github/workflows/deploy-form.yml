name: Deploy Formulário Orflie → GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'tmp_forms_onboarding/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload formulário
        uses: actions/upload-pages-artifact@v3
        with:
          path: tmp_forms_onboarding

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
